<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffb26f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ActivityWheel" />
    <title>Activity Wheel</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="wheel-panel">
        <div class="wheel-toolbar">
          <div class="set-switcher">
            <label class="set-switcher-label" for="activeSetSelect">Activity set</label>
            <select id="activeSetSelect" class="set-select" aria-label="Choose an activity set"></select>
          </div>
          <button id="openCustomizeButton" class="ghost-button toolbar-button" type="button">
            Customize activities
          </button>
        </div>

        <div class="wheel-frame">
          <div class="wheel-pointer" aria-hidden="true"></div>
          <canvas
            id="wheel"
            width="720"
            height="720"
            aria-label="Activity selection wheel"
            role="img"
          ></canvas>
        </div>

        <div class="status-card" aria-live="polite">
          <p class="status-label">Selected activity</p>
          <h1 id="result">Tap spin to choose</h1>
        </div>

        <button id="spinButton" class="spin-button" type="button">Spin</button>
        <p id="versionLabel" class="version-label"></p>
      </section>
    </main>

    <div id="customizeModal" class="modal" hidden>
      <div id="modalBackdrop" class="modal-backdrop"></div>
      <aside
        class="config-panel modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="customizeTitle"
      >
        <div class="panel-header modal-header">
          <div>
            <p class="eyebrow">Customize</p>
            <h2 id="customizeTitle">Activities</h2>
          </div>
          <button id="closeCustomizeButton" class="icon-button" type="button" aria-label="Close">
            ×
          </button>
        </div>

        <p class="panel-copy">
          Save multiple activity sets on this device, switch between them, and edit the current one.
        </p>

        <div class="set-editor">
          <label class="list-label" for="modalSetSelect">Saved set</label>
          <div class="set-editor-row">
            <select id="modalSetSelect" class="set-select" aria-label="Choose a saved activity set"></select>
            <button id="newSetButton" class="secondary-button" type="button">New set</button>
            <button id="deleteSetButton" class="ghost-button" type="button">Delete set</button>
          </div>

          <label class="sr-only" for="setNameInput">Set name</label>
          <input
            id="setNameInput"
            class="activity-name-input"
            type="text"
            maxlength="32"
            placeholder="Name this activity set"
            autocomplete="off"
          />
        </div>

        <div class="activity-editor">
          <label class="sr-only" for="activityNameInput">Activity name</label>
          <input
            id="activityNameInput"
            class="activity-name-input"
            type="text"
            maxlength="40"
            placeholder="Edit selected activity"
            autocomplete="off"
          />

          <div class="list-actions">
            <button id="addButton" class="secondary-button" type="button">Add</button>
            <button id="removeButton" class="ghost-button" type="button">Remove</button>
            <button id="moveUpButton" class="ghost-button" type="button">Move up</button>
            <button id="moveDownButton" class="ghost-button" type="button">Move down</button>
          </div>
        </div>

        <div class="activity-list-shell">
          <p class="list-label">Activity list</p>
          <ul id="activityList" class="activity-list" aria-label="Activity list"></ul>
        </div>

        <div class="config-actions">
          <button id="saveButton" class="secondary-button" type="button">Save set</button>
        </div>

        <p id="saveStatus" class="save-status" aria-live="polite"></p>
      </aside>
    </div>

    <script src="build-info.js"></script>
    <script src="script.js"></script>
  </body>
</html>
